name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write  # Required for cosign keyless signing via GitHub OIDC

env:
  CARGO_TERM_COLOR: always

jobs:
  gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Tests
        run: cargo test --workspace

  build:
    name: Build (${{ matrix.target }})
    needs: [gate]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            native_prompt: linux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            native_prompt: linux
          - target: x86_64-apple-darwin
            os: macos-13
            native_prompt: macos
          - target: aarch64-apple-darwin
            os: macos-latest
            native_prompt: macos

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux native prompt deps
        if: matrix.native_prompt == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev

      - name: Build workspace
        run: cargo build --workspace --release

      - name: Build native prompt (Linux)
        if: matrix.native_prompt == 'linux'
        run: cd native/linux && cargo build --release

      - name: Build native prompt (macOS)
        if: matrix.native_prompt == 'macos'
        run: cd native/macos && swift build -c release

      - name: Package
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ARCHIVE="grimoire-${TAG}-${{ matrix.target }}"
          mkdir -p "${ARCHIVE}"

          # Core binaries
          cp target/release/grimoire "${ARCHIVE}/"
          cp target/release/grimoire-service "${ARCHIVE}/"
          cp target/release/grimoire-prompt "${ARCHIVE}/"

          # Native prompt
          if [ -f native/linux/target/release/grimoire-prompt-linux ]; then
            cp native/linux/target/release/grimoire-prompt-linux "${ARCHIVE}/"
          fi
          if [ -f native/macos/.build/release/grimoire-prompt-macos ]; then
            cp native/macos/.build/release/grimoire-prompt-macos "${ARCHIVE}/"
          fi

          # Service files and install script
          cp -r contrib "${ARCHIVE}/"

          tar czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"
          echo "ARCHIVE=${ARCHIVE}.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  sign:
    name: Sign & Publish
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git-cliff changelog

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          CHECKSUMS="grimoire-${TAG}-checksums.sha256"
          cd artifacts
          find . -name '*.tar.gz' -exec sha256sum {} + | sed 's|  \./[^/]*/|  |' > "../${CHECKSUMS}"
          cd ..
          echo "CHECKSUMS=${CHECKSUMS}" >> $GITHUB_ENV
          cat "${CHECKSUMS}"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign checksums
        run: |
          cosign sign-blob "${CHECKSUMS}" \
            --yes \
            --output-signature "${CHECKSUMS}.sig" \
            --output-certificate "${CHECKSUMS}.cert"

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Release-please creates the release; we upload build artifacts to it.
          # If release doesn't exist yet (manual tag), create it.
          if ! gh release view "${TAG}" > /dev/null 2>&1; then
            gh release create "${TAG}" --title "${TAG}" --generate-notes
          fi
          gh release upload "${TAG}" \
            artifacts/**/*.tar.gz \
            "${CHECKSUMS}" \
            "${CHECKSUMS}.sig" \
            "${CHECKSUMS}.cert"

  homebrew:
    name: Update Homebrew Tap
    needs: [sign]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download checksums from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release download "${TAG}" --pattern "*-checksums.sha256" --dir .

      - name: Generate formula
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          CHECKSUMS="grimoire-${TAG}-checksums.sha256"
          REPO="${{ github.repository }}"

          get_sha() {
            grep "  $1\$" "${CHECKSUMS}" | cut -d' ' -f1
          }

          SHA_LINUX_AMD64="$(get_sha "grimoire-${TAG}-x86_64-unknown-linux-gnu.tar.gz")"
          SHA_LINUX_ARM64="$(get_sha "grimoire-${TAG}-aarch64-unknown-linux-gnu.tar.gz")"
          SHA_MACOS_AMD64="$(get_sha "grimoire-${TAG}-x86_64-apple-darwin.tar.gz")"
          SHA_MACOS_ARM64="$(get_sha "grimoire-${TAG}-aarch64-apple-darwin.tar.gz")"

          cat > grimoire.rb << FORMULA
          class Grimoire < Formula
            desc "Password manager CLI and SSH agent for Bitwarden/Vaultwarden"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "GPL-3.0-or-later"

            on_macos do
              on_arm do
                url "https://github.com/${REPO}/releases/download/${TAG}/grimoire-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_MACOS_ARM64}"
              end
              on_intel do
                url "https://github.com/${REPO}/releases/download/${TAG}/grimoire-${TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_MACOS_AMD64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/${REPO}/releases/download/${TAG}/grimoire-${TAG}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              end
              on_intel do
                url "https://github.com/${REPO}/releases/download/${TAG}/grimoire-${TAG}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              bin.install "grimoire"
              bin.install "grimoire-service"
              bin.install "grimoire-prompt"
              bin.install "grimoire-prompt-macos" if File.exist?("grimoire-prompt-macos")
              bin.install "grimoire-prompt-linux" if File.exist?("grimoire-prompt-linux")
            end

            test do
              assert_match "grimoire", shell_output("#{bin}/grimoire --help")
            end
          end
          FORMULA

      - name: Push formula to tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/morten-olsen/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp grimoire.rb tap/Formula/grimoire.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/grimoire.rb
          git commit -m "grimoire: update to ${TAG}"
          git push
