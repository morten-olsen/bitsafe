name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write  # Required for cosign keyless signing via GitHub OIDC

env:
  CARGO_TERM_COLOR: always

jobs:
  gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Tests
        run: cargo test --workspace

  build:
    name: Build (${{ matrix.target }})
    needs: [gate]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            native_prompt: linux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            native_prompt: linux
          - target: x86_64-apple-darwin
            os: macos-13
            native_prompt: macos
          - target: aarch64-apple-darwin
            os: macos-latest
            native_prompt: macos

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux native prompt deps
        if: matrix.native_prompt == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev

      - name: Build workspace
        run: cargo build --workspace --release

      - name: Build native prompt (Linux)
        if: matrix.native_prompt == 'linux'
        run: cd native/linux && cargo build --release

      - name: Build native prompt (macOS)
        if: matrix.native_prompt == 'macos'
        run: cd native/macos && swift build -c release

      - name: Package
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ARCHIVE="grimoire-${TAG}-${{ matrix.target }}"
          mkdir -p "${ARCHIVE}"

          # Core binaries
          cp target/release/grimoire "${ARCHIVE}/"
          cp target/release/grimoire-service "${ARCHIVE}/"
          cp target/release/grimoire-prompt "${ARCHIVE}/"

          # Native prompt
          if [ -f native/linux/target/release/grimoire-prompt-linux ]; then
            cp native/linux/target/release/grimoire-prompt-linux "${ARCHIVE}/"
          fi
          if [ -f native/macos/.build/release/grimoire-prompt-macos ]; then
            cp native/macos/.build/release/grimoire-prompt-macos "${ARCHIVE}/"
          fi

          # Service files and install script
          cp -r contrib "${ARCHIVE}/"

          tar czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"
          echo "ARCHIVE=${ARCHIVE}.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  sign:
    name: Sign & Publish
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git-cliff changelog

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          CHECKSUMS="grimoire-${TAG}-checksums.sha256"
          cd artifacts
          find . -name '*.tar.gz' -exec sha256sum {} + | sed 's|  \./[^/]*/|  |' > "../${CHECKSUMS}"
          cd ..
          echo "CHECKSUMS=${CHECKSUMS}" >> $GITHUB_ENV
          cat "${CHECKSUMS}"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign checksums
        run: |
          cosign sign-blob "${CHECKSUMS}" \
            --yes \
            --output-signature "${CHECKSUMS}.sig" \
            --output-certificate "${CHECKSUMS}.cert"

      - name: Generate changelog
        run: |
          pip install git-cliff
          # Generate changelog for this tag only
          git-cliff --latest --strip header > RELEASE_NOTES.md
          # Append verification instructions
          cat >> RELEASE_NOTES.md << 'FOOTER'

          ---

          ## Verification

          ```bash
          # Verify checksum
          sha256sum -c grimoire-*-checksums.sha256 --ignore-missing

          # Verify signature (requires cosign)
          cosign verify-blob \
            --certificate grimoire-*-checksums.sha256.cert \
            --signature grimoire-*-checksums.sha256.sig \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp 'https://github\.com/.*/.*/\.github/workflows/release\.yml@.*' \
            grimoire-*-checksums.sha256
          ```
          FOOTER

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file RELEASE_NOTES.md \
            artifacts/**/*.tar.gz \
            "${CHECKSUMS}" \
            "${CHECKSUMS}.sig" \
            "${CHECKSUMS}.cert"
