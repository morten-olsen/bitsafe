name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Tests
        run: cargo test --workspace

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        # RUSTSEC-2023-0071: RSA Marvin Attack — no fix available, transitive dep from SDK.
        #   Our RSA usage is SSH signing over a local Unix socket (timing not exploitable).
        # RUSTSEC-2026-0049: rustls-webpki CRL matching — no fix available, transitive dep from SDK.
        run: cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2026-0049

  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: macos
      - name: Run tests
        run: cargo test --workspace

  build:
    name: Build (${{ matrix.os }})
    needs: [gate]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-build
      - name: Build workspace
        run: cargo build --workspace --release
      - name: Build native prompt (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev
          cd native/linux && cargo build --release
      - name: Build native prompt (macOS)
        if: runner.os == 'macOS'
        run: cd native/macos && swift build -c release
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: grimoire-${{ runner.os }}
          path: |
            target/release/grimoire
            target/release/grimoire-service
            target/release/grimoire-prompt
            native/linux/target/release/grimoire-prompt-linux
            native/macos/.build/release/grimoire-prompt-macos
          if-no-files-found: ignore

  nix:
    name: Nix Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Check flake
        run: nix flake check
      - name: Build default package
        run: nix build
